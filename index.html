<html>
  <head>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <h1>Save the Polar Bears</h1>
    <div id="instructions">
      <h3>Instructions: </h3>
      <p>Help keep the polar bears fed for the winter by clicking on the
      seals as they pop up from the ice. </p>
      <h3>Select your difficulty level, then click start to play!</h3>
       <div class="difficulty-container">
        <button class="difficulty">easy</button>
        <button class="difficulty">normal</button>
        <button class="difficulty">hard</button>
    </div>
    </div>
    <div>
      <button id="start">start</button>
    </div>

      <div id="score-box">
        <h2>score: <span id="score">0</span></h2>
        <h2>time left: <span id="timer">0</span> seconds</h2>
      </div>
  
    <div class="grid">
      <div id="hole0" class="hole">
        <div class="mole-container">
          <div id="mole0" class="mole"></div>
        </div>
      </div>
      <div id="hole1" class="hole">
        <div class="mole-container">
          <div id="mole1" class="mole"></div>
        </div>
      </div>
      <div id="hole2" class="hole">
        <div class="mole-container">
          <div id="mole2" class="mole"></div>
        </div>
      </div>
      <div id="hole3" class="hole">
        <div class="mole-container">
          <div id="mole3" class="mole"></div>
        </div>
      </div>
      <div id="hole4" class="hole">
        <div class="mole-container">
          <div id="mole4" class="mole"></div>
        </div>
      </div>
      <div id="hole5" class="hole">
        <div class="mole-container">
          <div id="mole5" class="mole"></div>
        </div>
      </div>
      <div id="hole6" class="hole">
        <div class="mole-container">
          <div id="mole6" class="mole"></div>
        </div>
      </div>
      <div id="hole7" class="hole">
        <div class="mole-container">
          <div id="mole7" class="mole"></div>
        </div>
      </div>
      <div id="hole8" class="hole">
        <div class="mole-container">
          <div id="mole8" class="mole"></div>
        </div>
      </div>
      <!--TODO: Add the missing holes and moles. -->
    </div>
    <div id="game-over-modal" style="display:none;">
      <div id="game-over-content">
        <h2 id="game-over-message"></h2>
        <button id="close-modal">Close</button>
      </div>
    </div>

    <script src="./src/index.js"></script>
  </body>
</html>
